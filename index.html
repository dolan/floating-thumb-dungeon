<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Dungeon Demo</title>
<style>
  html,body{
    margin:0;padding:0;height:100%;width:100%;background:#000;overflow:hidden;
    overscroll-behavior:none;touch-action:none;
    user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;
    -webkit-tap-highlight-color:transparent;
  }
  #game{display:block;width:100vw;height:100vh;touch-action:none;
    image-rendering:pixelated;image-rendering:crisp-edges;}
  #boot{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    color:#9ad;font:16px/1.4 monospace;text-align:center;padding:24px;box-sizing:border-box;}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="boot">Loading…</div>
<script type="module" src="src/main.js"></script>
</body>
</html>
